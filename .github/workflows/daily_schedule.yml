name: 당일 일정 알림

on:
  schedule:
    # 매일 아침 7시 (KST = UTC+9, 즉 UTC 22:00 전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 당일 일정 전송
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SCHEDULE }}
        run: |
          python -c "
          from google_calendar import daily_schedule_text, send_slack, CALENDAR_USERS
          for calendar_id, name in CALENDAR_USERS.items():
              msg = daily_schedule_text(calendar_id=calendar_id, name=name)
              print(msg)
              send_slack(msg)
          "
